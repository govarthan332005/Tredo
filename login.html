<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Writely - Assignment & Writing Services</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo & Branding -->
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-pen-nib"></i>
                </div>
                <h1 class="brand-name">Writely</h1>
                <p class="brand-tagline">Your Writing, Delivered ✨</p>
            </div>

            <!-- Tab Switcher -->
            <div class="tab-switcher">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="signup">Sign Up</button>
                <div class="tab-indicator"></div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="loginIdentifier" required>
                    <label>Email or Username</label>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="loginPassword" required>
                    <label>Password</label>
                    <i class="fas fa-eye toggle-pw"></i>
                </div>
                <div class="form-options">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="rememberMe" checked>
                        <span class="custom-checkbox"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="submit-btn">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <p class="form-error" id="loginError"></p>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="signupUsername" required>
                    <label>Username</label>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="signupEmail" required>
                    <label>Email Address</label>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="signupPassword" required minlength="6">
                    <label>Password</label>
                    <i class="fas fa-eye toggle-pw"></i>
                </div>
                <button type="submit" class="submit-btn">
                    <span>Create Account</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <p class="form-error" id="signupError"></p>
            </form>

            <div class="auth-footer">
                <p>By continuing, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a></p>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="loader-pen">
                <i class="fas fa-pen-nib"></i>
            </div>
            <div class="loader-line"></div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module" src="./firebase-config.js"></script>
    <script type="module" src="./auth.js"></script>
</body>
</html>
