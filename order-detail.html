<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order Detail - Writely</title>
    <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { padding-bottom: 100px; }
        .product-header {
            position: sticky; top: 0; background: white; z-index: 100;
            padding: 14px 16px; display: flex; align-items: center; gap: 14px;
            box-shadow: var(--shadow-sm);
        }
        .back-btn { width: 40px; height: 40px; background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .product-header h2 { font-size: 16px; font-weight: 600; flex: 1; }
        
        .order-hero {
            background: var(--gradient); color: white; padding: 24px 20px;
            margin: 16px; border-radius: 20px; position: relative; overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .order-hero::before {
            content: ''; position: absolute; top: -40px; right: -40px;
            width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%;
        }
        .order-hero .badge {
            display: inline-block; background: rgba(255,255,255,0.2);
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
            backdrop-filter: blur(10px); margin-bottom: 12px;
        }
        .order-hero h2 { font-size: 22px; margin-bottom: 6px; }
        .order-hero p { opacity: 0.9; font-size: 14px; }
        .order-hero .order-id-big { font-size: 13px; margin-top: 12px; opacity: 0.85; font-family: monospace; }
        
        .timeline-card {
            background: white; margin: 0 16px 12px; padding: 20px;
            border-radius: 16px; box-shadow: var(--shadow-sm);
        }
        .timeline-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
        
        .timeline { position: relative; padding-left: 28px; }
        .timeline::before {
            content: ''; position: absolute; left: 8px; top: 8px; bottom: 8px;
            width: 2px; background: var(--border);
        }
        .timeline-item {
            position: relative; padding-bottom: 18px;
        }
        .timeline-item::before {
            content: ''; position: absolute; left: -24px; top: 4px;
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--border); border: 3px solid white;
        }
        .timeline-item.done::before { background: var(--success); }
        .timeline-item.current::before {
            background: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            animation: pulse 1.5s infinite;
        }
        .timeline-item h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .timeline-item p { font-size: 12px; color: var(--text-light); }
        .timeline-item.upcoming h4, .timeline-item.upcoming p { color: var(--text-light); }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
            50% { box-shadow: 0 0 0 8px rgba(99, 102, 241, 0.1); }
        }
        
        .info-card {
            background: white; margin: 0 16px 12px; padding: 18px 16px;
            border-radius: 16px; box-shadow: var(--shadow-sm);
        }
        .info-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .info-card h3 i { color: var(--primary); }
        
        .info-row {
            display: flex; justify-content: space-between; padding: 8px 0;
            font-size: 13px; gap: 16px;
        }
        .info-row .label { color: var(--text-light); }
        .info-row .value { color: var(--text-dark); font-weight: 600; text-align: right; word-break: break-word; }
        
        .product-block {
            display: flex; gap: 12px; align-items: center;
            padding: 12px; background: #f8fafc; border-radius: 12px;
        }
        .product-block img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .product-block h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .product-block p { font-size: 12px; color: var(--text-light); }
        
        .action-buttons {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; padding: 14px 16px max(14px, env(safe-area-inset-bottom));
            box-shadow: 0 -8px 24px rgba(0,0,0,0.08); z-index: 100;
            display: flex; gap: 10px;
        }
        .action-buttons button {
            flex: 1; padding: 14px; border-radius: 12px;
            font-family: inherit; font-size: 14px; font-weight: 600;
            cursor: pointer; border: none;
        }
        .btn-cancel { background: #fee2e2; color: var(--error); }
        .btn-support { background: var(--gradient); color: white; }
        
        @media (min-width: 768px) {
            .action-buttons { max-width: 480px; left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div class="page-loader" id="pageLoader"><div class="loader-circle"></div></div>
    
    <header class="product-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
        <h2>Order Details</h2>
    </header>

    <div id="content">
        <!-- Content rendered by JS -->
    </div>

    <div class="action-buttons" id="actions"></div>
    <div class="toast" id="toast"></div>

    <script type="module" src="./firebase-config.js"></script>
    <script type="module" src="./order-detail.js"></script>
</body>
</html>
